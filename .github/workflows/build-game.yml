name: Build Game Windows (.exe)

on:
  push:
    tags:
      - 'v*'  # Trigger saat push tag seperti v1.0.0, v2.1.0, dll
  workflow_dispatch:  # Bisa juga dijalankan manual dari GitHub Actions dashboard

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # 1. Checkout Repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python 3.12
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'  # Cache pip dependencies untuk build lebih cepat

      # 3. Install Dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Build .exe dengan PyInstaller
      - name: Build game dengan PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "assets;assets" main.py

      # 5. Upload Artifact (ZIP otomatis)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisteriKyaiAbdullah-Windows
          path: dist/main/
          retention-days: 30

      # 6. (Opsional) Buat GitHub Release otomatis jika dipicu oleh tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/main/**
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
