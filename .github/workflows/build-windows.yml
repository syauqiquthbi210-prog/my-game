name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Game dengan PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed `
        --collect-all panda3d `
        --collect-all ursina `
        --collect-all panda3d-gltf `
        --add-data "assets;assets" `
        --add-data "modules;modules" `
        --add-data "config.prc;." `
        --hidden-import="direct.interval.IntervalManager" `
        --hidden-import="panda3d.core" `
        --hidden-import="panda3d.direct" `
        --hidden-import="gltf" `
        --paths="." `
        main.py

    - name: Upload Hasil Masakan (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Game-Windows-Build
        path: dist/main/
