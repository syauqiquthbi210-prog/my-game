name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE
      shell: pwsh
      run: |
        # PyInstaller command with asset inclusions
        # We use --onedir for better compatibility with assets
        pyinstaller --noconfirm --onedir --windowed --name "HuntedByKuntilanak" `
        --add-data "*.png;." `
        --add-data "*.wav;." `
        --add-data "*.mp3;." `
        --add-data "*.glb;." `
        --add-data "*.webp;." `
        --add-data "*.jpg;." `
        main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HuntedByKuntilanak-Windows
        path: dist/HuntedByKuntilanak/
